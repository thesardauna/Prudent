<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prudent AI Compliance Copilot</title>
<link rel="stylesheet" href="style.css">

<!-- CSV parser -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<header class="header">
    <h1>Prudent AI Compliance Engine</h1>
    <p>Regulatory Intelligence for Nigerian SMEs</p>
</header>

<main class="container">

<section class="card">
<h2>Business Input</h2>

<form id="form">

<input id="business_id" placeholder="Business ID" required>
<input id="business_name" placeholder="Business Name" required>

<select id="state">
    <option value="">Select State</option>
    <option>Bauchi</option>
    <option>Lagos</option>
    <option>Kano</option>
    <option>Abuja</option>
    <option>Kaduna</option>
</select>

<input id="sector" placeholder="Sector (e.g AgricTech)">
<input id="lga" placeholder="LGA">

<select id="has_cac"><option>Yes</option><option>No</option></select>
<select id="has_tin"><option>Yes</option><option>No</option></select>
<select id="has_vat"><option>Yes</option><option>No</option></select>
<select id="has_nafdac"><option>Yes</option><option>No</option></select>
<select id="has_permit"><option>Yes</option><option>No</option></select>

<button type="submit">Analyze Compliance</button>

</form>
</section>

<section id="reportSection" class="card hidden">
<h2>Compliance Intelligence Report</h2>
<div id="reportContent"></div>

<div class="actions">
<button onclick="downloadCSV()">Download CSV</button>
<button onclick="window.print()">Download PDF</button>
</div>
</section>

</main>

<script src="script.js"></script>
</body>
</html>
