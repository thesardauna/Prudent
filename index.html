<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prudent – AI Compliance Copilot</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- CSV Parser -->
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <!-- PDF -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <h1>Prudent</h1>
  <p class="subtitle">AI Compliance Copilot for SMEs</p>

  <!-- FORM -->
  <div class="card">

    <h2>Check Your Compliance</h2>

    <label>Business Type</label>
    <input type="text" id="businessType" placeholder="e.g retail, food, ngo" />

    <label>State</label>
    <select id="state">
      <option>Loading states...</option>
    </select>

    <label>Business Size</label>
    <select id="size">
      <option value="">Select size</option>
      <option>Small</option>
      <option>Medium</option>
    </select>

    <button onclick="checkCompliance()">Check Compliance</button>

  </div>

  <!-- LOADING -->
  <div id="loading" class="card hidden">
    <p>🔄 Processing compliance...</p>
  </div>

  <!-- RESULT -->
  <div id="result" class="card hidden"></div>

</div>

<script>

/* =========================
   DATA
========================= */
let rulesData = [];
let riskData = [];
let stateData = [];

let latestReport = null;

/* =========================
   LOAD CSV
========================= */
function loadCSV(file) {
  return new Promise((resolve, reject) => {
    Papa.parse(file, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: res => resolve(res.data),
      error: err => reject(err)
    });
  });
}

/* =========================
   INIT
========================= */
async function init() {
  [rulesData, riskData, stateData] = await Promise.all([
    loadCSV("csv/regulatory_rules.csv"),
    loadCSV("csv/risk_matrix.csv"),
    loadCSV("csv/state_rules.csv")
  ]);

  populateStates();
}

init();

/* =========================
   POPULATE STATES
========================= */
function populateStates() {
  const select = document.getElementById("state");

  let states = [...new Set(stateData.map(s => s.state).filter(Boolean))];

  select.innerHTML = `<option value="">Select State</option>` +
    states.map(s => `<option value="${s}">${s}</option>`).join("");
}

/* =========================
   MAIN LOGIC
========================= */
function checkCompliance() {

  const type = normalize(document.getElementById("businessType").value);
  const state = normalize(document.getElementById("state").value);
  const size = normalize(document.getElementById("size").value);

  if (!type || !state || !size) {
    alert("Please fill all fields");
    return;
  }

  document.getElementById("loading").classList.remove("hidden");
  document.getElementById("result").classList.add("hidden");

  setTimeout(() => process(type, state, size), 500);
}

/* =========================
   PROCESS ENGINE
========================= */
function process(type, state, size) {

  let baseRules = rulesData.filter(r =>
    normalize(r.business_type) === type ||
    normalize(r.business_type) === "all"
  );

  baseRules = baseRules.filter(r =>
    !r.applicable_size ||
    normalize(r.applicable_size) === size ||
    normalize(r.applicable_size) === "all"
  );

  let localRules = stateData.filter(s =>
    normalize(s.state) === state
  );

  let requirements = [
    ...baseRules.map(r => r.requirement),
    ...localRules.map(r => r.requirement)
  ].filter(Boolean);

  requirements = [...new Set(requirements)];

  let missing = requirements.slice(0, Math.ceil(requirements.length / 2));
  let fulfilled = requirements.filter(r => !missing.includes(r));

  let totalRisk = 0;
  let penalties = [];

  missing.forEach(req => {
    let match = riskData.find(r =>
      normalize(r.requirement) === normalize(req)
    );

    if (match) {
      totalRisk += parseInt(match.severity_score || 0);
      penalties.push(match.penalty || "Penalty applies");
    }
  });

  let score = Math.max(0, 100 - totalRisk);

  let status = "Low Risk";
  if (score < 70) status = "Medium Risk";
  if (score < 40) status = "High Risk";

  latestReport = {
    type, state, size,
    requirements,
    missing,
    fulfilled,
    penalties,
    score,
    status
  };

  render();
}

/* =========================
   DISPLAY
========================= */
function render() {

  document.getElementById("loading").classList.add("hidden");

  const r = latestReport;
  const div = document.getElementById("result");

  div.classList.remove("hidden");

  div.innerHTML = `
    <h3>Compliance Result</h3>

    <p><strong>Business:</strong> ${capitalize(r.type)}</p>
    <p><strong>State:</strong> ${capitalize(r.state)}</p>

    <h4>Required</h4>
    <ul>${r.requirements.map(x => `<li>${x}</li>`).join("")}</ul>

    <h4>Missing</h4>
    <ul>${r.missing.map(x => `<li>${x}</li>`).join("")}</ul>

    <h4>Penalties</h4>
    <ul>${r.penalties.map(p => `<li>${p}</li>`).join("")}</ul>

    <p class="${colorClass(r.score)}">
      <strong>Score: ${r.score}% (${r.status})</strong>
    </p>

    <button onclick="downloadPDF()">Download PDF Report</button>
  `;
}

/* =========================
   PDF
========================= */
function downloadPDF() {

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const r = latestReport;
  let y = 20;

  doc.text("Prudent Compliance Report", 14, y);
  y += 10;

  doc.text(`Business: ${capitalize(r.type)}`, 14, y);
  y += 7;
  doc.text(`State: ${capitalize(r.state)}`, 14, y);
  y += 7;
  doc.text(`Score: ${r.score}% (${r.status})`, 14, y);
  y += 10;

  doc.text("Missing Items:", 14, y);
  y += 8;

  r.missing.forEach(m => {
    doc.text("- " + m, 14, y);
    y += 6;
  });

  doc.save("Prudent_Report.pdf");
}

/* =========================
   HELPERS
========================= */
function normalize(x) { return (x || "").toLowerCase().trim(); }
function capitalize(x) { return x.charAt(0).toUpperCase() + x.slice(1); }

function colorClass(score) {
  if (score < 40) return "red";
  if (score < 70) return "yellow";
  return "green";
}

</script>

</body>
</html>
