<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prudent Compliance Engine</title>

<style>
:root{
  --primary:#200080;
  --bg:#f7f9fc;
  --surface:#ffffff;
  --text:#182230;
  --muted:#667085;
  --border:#e3e8ef;
  --danger:#d92d20;
  --warn:#dc6803;
  --ok:#039855;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:15px;
}

h1{color:var(--primary);}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:15px;
}

.full{grid-column:1/-1;}

input,select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
}

button{
  padding:12px;
  background:var(--primary);
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.card{
  background:#fff;
  border:1px solid var(--border);
  padding:15px;
  margin-top:15px;
  border-radius:10px;
}

.badge{
  padding:5px 10px;
  border-radius:15px;
  color:#fff;
}

.high{background:var(--danger);}
.medium{background:var(--warn);}
.low{background:var(--ok);}
</style>

</head>

<body>

<div class="container">

<h1>Prudent Compliance Check</h1>

<form id="form">

<div class="grid">

<div class="full">
<label>Business Name</label>
<input name="business_name" required>
</div>

<div>
<label>Business Type</label>
<select name="business_type">
<option>Sole Proprietorship</option>
<option>Partnership</option>
<option>LLC</option>
</select>
</div>

<div>
<label>Sector</label>
<select name="sector">
<option>Agriculture</option>
<option>Health</option>
<option>Technology</option>
<option>Food & Beverage</option>
</select>
</div>

<div>
<label>State</label>
<select name="state">
<option>Bauchi</option>
<option>Lagos</option>
<option>Kano</option>
<option>FCT Abuja</option>
</select>
</div>

<div>
<label>CAC</label>
<select name="has_cac">
<option>Compliant</option>
<option>Non-Compliant</option>
</select>
</div>

<div>
<label>TIN</label>
<select name="has_tin">
<option>Compliant</option>
<option>Non-Compliant</option>
</select>
</div>

<div>
<label>VAT</label>
<select name="has_vat">
<option>Compliant</option>
<option>Non-Compliant</option>
</select>
</div>

<div>
<label>NAFDAC</label>
<select name="has_nafdac">
<option>Compliant</option>
<option>Non-Compliant</option>
</select>
</div>

<div>
<label>Permit</label>
<select name="has_permit">
<option>Compliant</option>
<option>Non-Compliant</option>
</select>
</div>

</div>

<br>
<button type="submit">Generate Report</button>

</form>

<div id="report"></div>

</div>

<script>

// Load CSV
async function loadCSV(){
  const res = await fetch("csv/general_rules.csv");
  const text = await res.text();
  const lines = text.split("\n");
  const headers = lines[0].split(",");
  
  return lines.slice(1).map(line=>{
    const values = line.split(",");
    let obj = {};
    headers.forEach((h,i)=>obj[h.trim()] = values[i]);
    return obj;
  });
}

let rules = [];
loadCSV().then(data=>rules=data);

// Match logic
function match(row,data){
  return (
    (row.business_type=="All" || row.business_type==data.business_type) &&
    (row.sector=="All" || row.sector==data.sector)
  );
}

// Score logic
function scoreCompliance(data){
  let score = 0;
  Object.values(data).forEach(v=>{
    if(v=="Compliant") score += 10;
  });
  return score;
}

document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

const data = Object.fromEntries(new FormData(this));

const filtered = rules.filter(r=>match(r,data));

let score = scoreCompliance(data);
let risk = score>60?"low":score>30?"medium":"high";

document.getElementById("report").innerHTML = `

<div class="card">
<h2>${data.business_name}</h2>
<p><b>Score:</b> ${score}%</p>
<span class="badge ${risk}">${risk.toUpperCase()} RISK</span>
</div>

<div class="card">
<h3>Regulators</h3>
<ul>${filtered.map(r=>`<li>${r.regulator}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Requirements</h3>
<ul>${filtered.map(r=>`<li>${r.requirement}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Compliance Status</h3>
<ul>${filtered.map(r=>`<li>${r.compliance_status}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Violations</h3>
<ul>${filtered.map(r=>`<li>${r.violation}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Penalties</h3>
<ul>${filtered.map(r=>`<li>${r.penalty}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Recommendations</h3>
<ul>${filtered.map(r=>`<li>${r.recommendation}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>State Variations</h3>
<ul>${filtered.map(r=>`<li>${r.state_variation}</li>`).join("")}</ul>
</div>

`;

});

</script>

</body>
</html>
