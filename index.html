<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prudent – AI Compliance Copilot</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>
/* PRINT MODE */
@media print {
  body * { visibility: hidden; }
  #report, #report * { visibility: visible; }
  #report { position: absolute; top: 0; left: 0; width: 100%; }
}
</style>

</head>

<body>

<div class="container">

<h1>Prudent</h1>
<p class="subtitle">AI Compliance Copilot for SMEs</p>

<div class="card">

<label>Business Type</label>
<input id="businessType" placeholder="retail, food, ngo">

<label>State</label>
<select id="state"></select>

<label>Business Size</label>
<select id="size">
<option value="">Select size</option>
<option>Small</option>
<option>Medium</option>
</select>

<button onclick="checkCompliance()">Analyze Compliance</button>

</div>

<div id="report" class="card hidden"></div>

</div>

<script>

/* DATA */
let rulesData = [], riskData = [], stateData = [], authorityData = [];

/* LOAD CSV */
function loadCSV(file){
  return new Promise(res=>{
    Papa.parse(file,{
      download:true,
      header:true,
      skipEmptyLines:true,
      complete:r=>res(r.data)
    });
  });
}

/* INIT */
async function init(){
  [rulesData, riskData, stateData, authorityData] = await Promise.all([
    loadCSV("csv/regulatory_rules.csv"),
    loadCSV("csv/risk_matrix.csv"),
    loadCSV("csv/state_rules.csv"),
    loadCSV("csv/authority_directory.csv")
  ]);
  populateStates();
}
init();

/* STATE DROPDOWN */
function populateStates(){
  let states=[...new Set(stateData.map(s=>s.state))];
  let select=document.getElementById("state");
  select.innerHTML="<option>Select State</option>"+
    states.map(s=>`<option>${s}</option>`).join("");
}

/* MAIN */
function checkCompliance(){

  let type=n(document.getElementById("businessType").value);
  let state=n(document.getElementById("state").value);
  let size=n(document.getElementById("size").value);

  let base=rulesData.filter(r=>n(r.business_type)==type||n(r.business_type)=="all");
  let local=stateData.filter(s=>n(s.state)==state);

  let req=[...base.map(r=>r.requirement),...local.map(l=>l.requirement)];
  req=[...new Set(req)];

  let missing=req.slice(0,Math.ceil(req.length/2));
  let fulfilled=req.filter(x=>!missing.includes(x));

  let risk=0, penalty=[], authorities=[];

  missing.forEach(m=>{
    let rm=riskData.find(r=>n(r.requirement)==n(m));
    if(rm){
      risk+=parseInt(rm.severity_score||0);
      penalty.push(rm.penalty);
    }
    let auth=rulesData.find(r=>n(r.requirement)==n(m));
    if(auth) authorities.push(auth.authority);
  });

  let score=Math.max(0,100-risk);

  render({
    type,state,size,req,missing,fulfilled,penalty,authorities,score
  });
}

/* RENDER REPORT */
function render(r){

  let status="Low Risk";
  if(r.score<70) status="Medium Risk";
  if(r.score<40) status="High Risk";

  let html=`
  <h2>Compliance Report</h2>

  <p><b>Business:</b> ${cap(r.type)}</p>
  <p><b>State:</b> ${cap(r.state)}</p>
  <p><b>Size:</b> ${cap(r.size)}</p>

  <hr>

  <h3>📊 Summary</h3>
  <p><b>Score:</b> ${r.score}% (${status})</p>
  <p><b>Total Requirements:</b> ${r.req.length}</p>
  <p><b>Missing:</b> ${r.missing.length}</p>

  <h3>📋 Required Compliance</h3>
  <ul>${r.req.map(x=>`<li>${x}</li>`).join("")}</ul>

  <h3>❌ Missing Requirements</h3>
  <ul>${r.missing.map(x=>`<li>${x}</li>`).join("")}</ul>

  <h3>⚖️ Penalties</h3>
  <ul>${r.penalty.map(p=>`<li>${p||"Penalty applies"}</li>`).join("")}</ul>

  <h3>🏛️ Authorities</h3>
  <ul>${[...new Set(r.authorities)].map(a=>`<li>${a}</li>`).join("")}</ul>

  <h3>📌 Recommendations</h3>
  <ul>
    <li>Complete missing compliance items immediately</li>
    <li>Register with required authorities</li>
    <li>Schedule compliance audit</li>
  </ul>

  <button onclick="window.print()">Print Report</button>
  <button onclick="downloadPDF()">Download PDF</button>
  `;

  let div=document.getElementById("report");
  div.classList.remove("hidden");
  div.innerHTML=html;
}

/* PDF */
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text(document.getElementById("report").innerText,10,10);
  doc.save("Prudent_Report.pdf");
}

/* HELPERS */
function n(x){return (x||"").toLowerCase().trim();}
function cap(x){return x.charAt(0).toUpperCase()+x.slice(1);}

</script>

</body>
</html>
