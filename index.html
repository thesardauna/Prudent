<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prudent Compliance Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f7f9fc;padding:20px;}
.container{max-width:1000px;margin:auto;background:#fff;padding:20px;border-radius:15px;}
h1{color:#200080;}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
.full{grid-column:1/-1;}
input,select{padding:10px;border:1px solid #ddd;border-radius:8px;width:100%;}
button{padding:12px;background:#200080;color:#fff;border:none;border-radius:8px;}
.card{border:1px solid #eee;padding:15px;margin-top:15px;border-radius:10px;}
.badge{padding:5px 10px;border-radius:15px;color:#fff;}
.high{background:#d92d20;}
.medium{background:#dc6803;}
.low{background:#039855;}
</style>

</head>

<body>

<div class="container">

<h1>Prudent Compliance Engine</h1>

<form id="form">

<div class="grid">

<div class="full">
<label>Business Name</label>
<input name="business_name" required>
</div>

<div>
<label>Business Type</label>
<select name="business_type" id="business_type"></select>
</div>

<div>
<label>Sector</label>
<select name="sector" id="sector"></select>
</div>

<div>
<label>State</label>
<select name="state">
<option>Bauchi</option>
<option>Lagos</option>
<option>Kano</option>
<option>FCT Abuja</option>
</select>
</div>

<div><label>CAC</label><select name="has_cac"><option>Compliant</option><option>Non-Compliant</option></select></div>
<div><label>TIN</label><select name="has_tin"><option>Compliant</option><option>Non-Compliant</option></select></div>
<div><label>VAT</label><select name="has_vat"><option>Compliant</option><option>Non-Compliant</option></select></div>
<div><label>NAFDAC</label><select name="has_nafdac"><option>Compliant</option><option>Non-Compliant</option></select></div>
<div><label>Permit</label><select name="has_permit"><option>Compliant</option><option>Non-Compliant</option></select></div>

</div>

<br>
<button type="submit">Generate Report</button>

</form>

<div id="report"></div>

</div>

<script>

// CSV loader
async function loadCSV(path){
  const res = await fetch(path);
  const text = await res.text();

  const lines = text.trim().split("\n");
  const headers = lines[0].split(",").map(h=>h.trim().toLowerCase());

  return lines.slice(1).map(line=>{
    const values = line.split(",");
    let obj={};
    headers.forEach((h,i)=>obj[h]=values[i]?.trim());
    return obj;
  });
}

let dataCSV=[];

async function init(){
  dataCSV = await loadCSV("csv/general_rules.csv");

  // populate business types
  const types = [...new Set(dataCSV.map(r=>r.business_type))];
  document.getElementById("business_type").innerHTML =
    types.map(t=>`<option>${t}</option>`).join("");

  // populate sectors
  const sectors = [...new Set(dataCSV.map(r=>r.sector))];
  document.getElementById("sector").innerHTML =
    sectors.map(s=>`<option>${s}</option>`).join("");
}

init();

// risk engine
function calculateRisk(rows){
  let score = 0;
  let issues = [];

  rows.forEach(r=>{
    if(r.compliance_status === "Non-Compliant" || r.compliance_status === "Partial"){
      
      if(r.risk_level === "High") score += 25;
      else if(r.risk_level === "Medium") score += 15;
      else score += 5;

      issues.push(r);
    }
  });

  let level = score>50?"high":score>20?"medium":"low";
  return {score,level,issues};
}

// submit
document.getElementById("form").addEventListener("submit",function(e){
e.preventDefault();

const formData = Object.fromEntries(new FormData(this));

// filter rules
const rules = dataCSV.filter(r =>
  r.business_type === formData.business_type ||
  r.sector === formData.sector
);

// calculate risk
const risk = calculateRisk(rules);

// extract authorities
const authorities = [...new Set(rules.map(r=>r.regulator))];

// render
document.getElementById("report").innerHTML = `

<div class="card">
<h2>${formData.business_name}</h2>
<p><b>Risk Score:</b> ${risk.score}</p>
<span class="badge ${risk.level}">${risk.level.toUpperCase()}</span>
</div>

<div class="card">
<h3>Authorities</h3>
<ul>${authorities.map(a=>`<li>${a}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Key Risks</h3>
<ul>${risk.issues.map(r=>`<li>${r.violation}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Penalties</h3>
<ul>${risk.issues.map(r=>`<li>${r.penalty}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>Recommendations</h3>
<ul>${risk.issues.map(r=>`<li>${r.recommendation}</li>`).join("")}</ul>
</div>

<div class="card">
<h3>All Requirements</h3>
<ul>${rules.map(r=>`<li>${r.requirement}</li>`).join("")}</ul>
</div>

`;

});
</script>

</body>
</html>
